configuration:
  cgate_host:
    name: C-Gate Host
    description: IP address or hostname of the C-Gate server. Set to 127.0.0.1 when
      using managed mode, or the remote server address when using remote mode.
  cgate_port:
    name: C-Gate Command Port
    description: TCP port for C-Gate command connections. The default C-Gate command
      port is 20023.
  cgate_event_port:
    name: C-Gate Event Port
    description: TCP port for C-Gate event connections. The default C-Gate event
      port is 20025. This port receives real-time updates from C-Bus devices.
  cgate_project:
    name: C-Gate Project Name
    description: The name of your C-Bus project as configured in C-Gate (e.g., HOME).
  mqtt_host:
    name: MQTT Broker Host
    description: Auto-detected from the Mosquitto add-on. Only set this if you are
      using an external MQTT broker instead of the HA Mosquitto add-on.
  mqtt_port:
    name: MQTT Broker Port
    description: Auto-detected from the Mosquitto add-on. Only set this if you are
      using an external MQTT broker (default port is 1883).
  mqtt_username:
    name: MQTT Username
    description: Auto-detected from the Mosquitto add-on. Only set this if you are
      using an external MQTT broker or need to override the credentials.
  mqtt_password:
    name: MQTT Password
    description: Auto-detected from the Mosquitto add-on. Only set this if you are
      using an external MQTT broker or need to override the credentials.
  mqtt_use_tls:
    name: Enable MQTT TLS
    description: Connect to the MQTT broker using TLS (mqtts://). Enable this when
      your broker requires an encrypted connection, typically on port 8883. Leave
      disabled for the standard Mosquitto add-on.
  mqtt_ca_file:
    name: MQTT CA Certificate File
    description: Path to a CA certificate file used to verify the MQTT broker's TLS
      certificate. Required when your broker uses a self-signed certificate. Certs
      are usually stored in /ssl/ on Home Assistant (e.g., /ssl/ca.crt).
  mqtt_reject_unauthorized:
    name: Verify MQTT TLS Certificate
    description: Reject connections if the broker's TLS certificate cannot be
      verified. Keep enabled for security. Disable only if you are using a
      self-signed certificate without a CA file and understand the risks.
  auto_discover_networks:
    name: Auto-Discover C-Bus Networks
    description: Automatically discover C-Bus network IDs from C-Gate on connect by
      querying the project tree. When enabled, discovered networks are used for polling
      and HA Discovery unless overridden by explicit network configuration. Disable if
      auto-discovery causes issues or you want to restrict monitoring to specific networks.
  getall_networks:
    name: C-Bus Networks to Monitor
    description: List of C-Bus network IDs to poll for device states. The default
      network is 254, which is the standard C-Bus network number for most
      installations. To find your network IDs, open the C-Gate Toolkit
      application, expand your project, and look at the network numbers listed
      under it. You can also use Clipsal C-Bus Toolkit (CBAT) under Project >
      Network List.
  getall_on_start:
    name: Poll on Startup
    description: Request all device states when the add-on starts. Useful for
      synchronizing Home Assistant with the current state of all C-Bus devices.
  getall_period:
    name: Poll Interval (seconds)
    description: How often to request all device states, in seconds. Lower values
      provide fresher state but increase network traffic to C-Gate.
  retain_reads:
    name: Retain MQTT State Messages
    description: Set the MQTT retain flag on state messages. When enabled, new MQTT
      subscribers immediately receive the last known state of each device.
  message_interval:
    name: Command Interval (ms)
    description: Minimum delay between commands sent to C-Gate, in milliseconds.
      Prevents overwhelming C-Gate with rapid commands. Default 200ms.
  log_level:
    name: Log Level
    description: Logging verbosity. Use debug for troubleshooting, info for normal
      operation, warn for warnings only, or error for errors only.
  ha_discovery_enabled:
    name: Enable Home Assistant Discovery
    description: Automatically register C-Bus devices with Home Assistant using MQTT
      Discovery. Devices appear as entities without manual configuration.
  ha_discovery_prefix:
    name: Discovery Topic Prefix
    description: "MQTT topic prefix for Home Assistant Discovery messages. This must
      match your Home Assistant MQTT discovery prefix (default: homeassistant)."
  ha_discovery_networks:
    name: Discovery Networks
    description: C-Bus network IDs to scan for device discovery. Defaults to 254,
      the standard C-Bus network. If empty, falls back to the networks listed in
      "C-Bus Networks to Monitor". Most installations only have one network.
  ha_discovery_cover_app_id:
    name: Cover Application ID
    description: C-Bus application ID to treat as covers (blinds, shutters, garage
      doors). Common value is 203 (Enable Control). Leave empty to disable cover
      discovery.
  ha_discovery_cover_tilt_app_id:
    name: Cover Tilt Application ID
    description: C-Bus application ID for venetian/louvre blind tilt angle control.
      Groups in this application are paired by group number with covers in the Cover
      Application. Leave empty to disable tilt control.
  ha_discovery_switch_app_id:
    name: Switch Application ID
    description: C-Bus application ID to treat as switches. Leave empty to disable
      switch discovery.
  ha_discovery_trigger_app_id:
    name: Trigger App ID
    description: C-Bus application ID for trigger groups (keypads, scenes). Default
      is 202. Leave empty to disable trigger discovery.
  ha_discovery_scene_enabled:
    name: Enable Scene Entities
    description: Publish a Home Assistant scene entity for each C-Bus trigger group
      in addition to the event and button entities. Scene entities appear in the HA
      Scenes dashboard and can be activated from automations and scripts. Disable to
      suppress scene entities while keeping event and button entities.
  ha_discovery_hvac_app_id:
    name: HVAC Application ID
    description: C-Bus application ID for HVAC/air conditioning zones. The standard
      C-Bus HVAC application is 201. Each group address in this application will be
      exposed as a Home Assistant climate entity. Leave empty to disable HVAC
      discovery.
  ha_hvac_temperature_unit:
    name: HVAC Temperature Unit
    description: Temperature unit for HVAC climate entities. Use C for Celsius (default)
      or F for Fahrenheit.
  ha_bridge_diagnostics_enabled:
    name: Enable Bridge Diagnostics
    description: Publish bridge health entities (ready state, connection status,
      queue depth) using Home Assistant MQTT Discovery.
  ha_bridge_diagnostics_interval_sec:
    name: Diagnostics Update Interval (seconds)
    description: How often bridge diagnostic entity states are refreshed. Lower
      values update faster but increase MQTT traffic.
  cgate_mode:
    name: C-Gate Mode
    description: How C-Gate is provided. "remote" connects to a C-Gate server
      running elsewhere on your network. "managed" downloads and runs C-Gate
      locally inside this add-on (requires Java and a C-Bus serial interface).
  cgate_install_source:
    name: C-Gate Install Source
    description: Only used when C-Gate Mode is "managed". "download" automatically
      downloads C-Gate from the official Clipsal URL on first start. "upload"
      looks for a C-Gate zip file you place in /share/cgate/.
  cgate_download_url:
    name: C-Gate Download URL
    description: Only used when C-Gate Mode is "managed" and Install Source is
      "download". Override the default URL if the official Clipsal download
      location changes. Leave empty to use the default URL.
  cgate_download_sha256:
    name: C-Gate Download SHA256
    description: Optional SHA256 checksum used to verify the downloaded (or
      uploaded) C-Gate zip file before installation. Recommended when using a
      custom download URL.
  connection_pool_size:
    name: "C-Gate Connection Pool Size"
    description: "Number of parallel TCP connections to C-Gate for sending commands. Increase for high-throughput installations, reduce to 1 for older C-Gate versions. Default: 3."
  connection_health_check_interval_sec:
    name: "Connection Health Check Interval"
    description: "How often (seconds) to verify C-Gate command connections are healthy. Lower values detect failures faster. Default: 30."
  connection_keep_alive_interval_sec:
    name: "Connection Keep-Alive Interval"
    description: "How often (seconds) to send keep-alive pings to C-Gate connections. Prevents silent TCP drops on unstable networks. Default: 60."
  cbus_label_file:
    name: Custom Label File
    description: Path to a JSON file with custom device names for C-Bus groups.
      Generated by the import tool or the built-in label editor. Labels from
      this file take priority over names from C-Gate. Auto-detected from common
      paths if not set. The file is watched and changes are applied
      automatically.
  web_api_key:
    name: Web API Key
    description: API key required for write operations in the label editor API. Set
      this when exposing port 8080 beyond Home Assistant ingress.
  web_allow_unauthenticated_mutations:
    name: Allow Unauthenticated Web Writes (Unsafe)
    description: If enabled, PUT/PATCH/POST write endpoints are allowed without an
      API key. Keep disabled unless you fully trust network access to this
      add-on.
  web_allowed_origins:
    name: Allowed Web Origins
    description: Optional CORS allowlist for browser access. Provide full origins
      such as https://ha.example.com. Leave empty to disable cross-origin
      browser access.
  web_mutation_rate_limit_per_minute:
    name: Web Write Rate Limit Per Minute
    description: Maximum number of mutating API requests per minute per client
      source. Helps protect label update endpoints from abuse or runaway
      clients.
