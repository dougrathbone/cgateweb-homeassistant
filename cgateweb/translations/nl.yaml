configuration:
  # ── Verplichte velden (altijd zichtbaar) ──
  cgate_mode:
    name: C-Gate Modus
    description: >-
      Hoe C-Gate wordt aangeboden. "remote" maakt verbinding met een C-Gate
      server die elders op uw netwerk draait (meest voorkomend). "managed"
      downloadt en draait C-Gate lokaal binnen deze add-on.
  cgate_host:
    name: C-Gate Host (verplicht)
    description: >-
      IP-adres of hostnaam van uw C-Gate server. In de externe modus het
      adres van de machine met C-Gate invoeren. In de beheerde modus
      127.0.0.1 gebruiken.
  cgate_project:
    name: C-Gate Projectnaam (verplicht)
    description: >-
      De naam van uw C-Bus project zoals geconfigureerd in C-Gate (bijv.
      HOME, MYHOUSE). Vind dit in C-Gate Toolkit onder uw projectboom.
  ha_discovery_enabled:
    name: Home Assistant Discovery inschakelen
    description: >-
      Registreer C-Bus apparaten automatisch bij Home Assistant met MQTT
      Discovery. De meeste gebruikers moeten dit ingeschakeld laten.
      Apparaten verschijnen als entiteiten zonder handmatige
      YAML-configuratie.
  log_level:
    name: Logniveau
    description: >-
      Logboekuitgebreidheid. Gebruik "info" voor normaal gebruik, "debug"
      voor het oplossen van verbindings- of discovery-problemen.

  # ── C-Gate Verbinding (optioneel, verstandige standaardwaarden) ──
  cgate_port:
    name: C-Gate Commandopoort
    description: >-
      TCP-poort voor C-Gate commandoverbindingen. Alleen wijzigen als uw
      C-Gate een niet-standaard poort gebruikt. Standaard: 20023.
  cgate_event_port:
    name: C-Gate Gebeurtenispoort
    description: >-
      TCP-poort voor C-Gate gebeurtenisverbindingen. Alleen wijzigen als uw
      C-Gate een niet-standaard poort gebruikt. Standaard: 20025.

  # ── C-Gate Beheerde Modus ──
  cgate_install_source:
    name: C-Gate Installatiebron
    description: >-
      Alleen gebruikt in beheerde modus. "download" haalt C-Gate
      automatisch op. "upload" zoekt naar een zipbestand dat u in
      /share/cgate/ plaatst.
  cgate_download_url:
    name: C-Gate Download URL
    description: >-
      Alleen gebruikt in beheerde modus met downloadbron. Overschrijf als
      de officiële Clipsal download-URL wijzigt. Laat leeg voor de
      standaard-URL.
  cgate_download_sha256:
    name: C-Gate Download SHA256
    description: >-
      Optionele SHA256-checksum om de C-Gate download te verifiëren.
      Aanbevolen bij gebruik van een aangepaste download-URL.
  cgate_force_reinstall:
    name: C-Gate herinstallatie forceren
    description: >-
      Alleen gebruikt in managed-modus. Eenmaal geïnstalleerd blijft C-Gate normaal gesproken ongewijzigd. Schakel dit in om C-Gate bij de volgende start opnieuw te installeren/bij te werken vanaf de installatiebron (uw projectdatabases en configuratie blijven behouden); in upload-modus kunt u in plaats daarvan een nieuwere zip in /share/cgate plaatsen. Schakel dit na de upgrade weer uit.

  cgate_serial_device:
    name: Serieel PCI-apparaat (alfa)
    description: >-
      ALPHA: experimentele ondersteuning voor USB-seriële pc-interfaces (5500PC/5500PCU). Selecteer een gedetecteerd serieel apparaat in de vervolgkeuzelijst; gebruik bij voorkeur paden onder /dev/serial/by-id/. Om een aangepast pad in te voeren, schakelt u de configuratie-editor over naar de YAML-modus. Vereist de managed-modus en een C-Bus Toolkit-project dat is geconfigureerd voor een seriële pc-interface. Meld problemen op GitHub (issue #28).

  # ── MQTT (meestal automatisch gedetecteerd) ──
  mqtt_host:
    name: MQTT Broker Host
    description: >-
      Automatisch gedetecteerd via de Mosquitto add-on — de meeste
      gebruikers moeten dit leeg laten. Alleen instellen bij gebruik van
      een externe MQTT broker.
  mqtt_port:
    name: MQTT Broker Poort
    description: >-
      Automatisch gedetecteerd via de Mosquitto add-on. Alleen instellen
      voor externe brokers. Standaard: 1883.
  mqtt_username:
    name: MQTT Gebruikersnaam
    description: >-
      Automatisch gedetecteerd via de Mosquitto add-on. Alleen instellen
      voor externe brokers of om inloggegevens te overschrijven.
  mqtt_password:
    name: MQTT Wachtwoord
    description: >-
      Automatisch gedetecteerd via de Mosquitto add-on. Alleen instellen
      voor externe brokers of om inloggegevens te overschrijven.
  mqtt_use_tls:
    name: MQTT TLS inschakelen
    description: >-
      Verbinden met MQTT via TLS (mqtts://). Inschakelen voor brokers die
      versleutelde verbindingen vereisen (meestal poort 8883). Niet nodig
      voor de standaard Mosquitto add-on.
  mqtt_ca_file:
    name: MQTT CA-certificaatbestand
    description: >-
      Pad naar CA-certificaat voor het verifiëren van het TLS-certificaat
      van de broker. Meestal opgeslagen in /ssl/ (bijv. /ssl/ca.crt).
      Alleen nodig voor zelfondertekende certificaten.
  mqtt_reject_unauthorized:
    name: MQTT TLS-certificaat verifiëren
    description: >-
      Verbindingen weigeren als het TLS-certificaat van de broker niet
      geverifieerd kan worden. Ingeschakeld houden voor beveiliging. Alleen
      uitschakelen voor zelfondertekende certificaten zonder CA-bestand.

  # ── C-Bus Monitoring ──
  auto_discover_networks:
    name: C-Bus netwerken automatisch ontdekken
    description: >-
      Automatisch netwerk-ID's ontdekken van C-Gate bij verbinding.
      Ontdekte netwerken worden gebruikt voor polling en HA Discovery.
      Alleen uitschakelen als auto-ontdekking problemen veroorzaakt.
      Standaard: ingeschakeld.
  getall_networks:
    name: Te monitoren C-Bus netwerken
    description: >-
      C-Bus netwerk-ID's om apparaatstatussen op te vragen. Standaard: 254
      (standaard C-Bus netwerk voor de meeste installaties). Vind uw
      netwerk-ID's in C-Gate Toolkit onder uw projectboom.
  getall_on_start:
    name: Alle apparaten opvragen bij opstarten
    description: >-
      Alle apparaatstatussen opvragen wanneer de add-on start, om Home
      Assistant te synchroniseren met de huidige C-Bus status. Standaard:
      ingeschakeld.
  getall_period:
    name: Opvraaginterval (seconden)
    description: >-
      Hoe vaak alle apparaatstatussen opnieuw worden opgevraagd. Lagere
      waarden = actuelere statussen maar meer C-Gate verkeer. Standaard:
      3600 (1 uur).
  getall_app_periods:
    name: Opvraagintervallen per applicatie
    description: >-
      Het opvraaginterval overschrijven voor specifieke C-Bus applicaties.
      Elke vermelding heeft een app_id (bijv. "56" voor Verlichting) en
      period_sec (0 om uit te schakelen).

  # ── MQTT Publicatie ──
  retain_reads:
    name: MQTT Statusberichten bewaren
    description: >-
      De MQTT retain-vlag instellen op statusberichten zodat nieuwe
      abonnees direct de laatst bekende apparaatstatus ontvangen.
      Standaard: uitgeschakeld.
  message_interval:
    name: Commando-interval (ms)
    description: >-
      Minimale vertraging tussen commando's naar C-Gate. Voorkomt
      overbelasting van C-Gate met snelle commando's. Standaard: 200ms.

  # ── Home Assistant Discovery ──
  ha_discovery_prefix:
    name: Discovery Topicprefix
    description: >-
      MQTT topicprefix voor HA Discovery berichten. Moet overeenkomen met
      uw Home Assistant MQTT Discovery prefix. Standaard: homeassistant.
  ha_discovery_networks:
    name: Discovery Netwerken
    description: >-
      C-Bus netwerk-ID's om te scannen voor apparaatdetectie. Indien leeg,
      worden de netwerken uit "Te monitoren C-Bus netwerken" gebruikt.
      Standaard: 254.
  ha_discovery_cover_app_id:
    name: Cover Applicatie-ID
    description: >-
      C-Bus app-ID voor covers (rolluiken, jaloezieën, garagedeuren).
      Veelgebruikte waarde: 203 (Enable Control). Laat leeg om
      cover-detectie over te slaan.
  ha_discovery_cover_tilt_app_id:
    name: Cover Kantel Applicatie-ID
    description: >-
      C-Bus app-ID voor kantelbesturing van jaloezieën. Gekoppeld op
      groepsnummer aan covers. Laat leeg om kanteling over te slaan.
  ha_discovery_switch_app_id:
    name: Schakelaar Applicatie-ID
    description: >-
      C-Bus app-ID voor schakelaargroepen. Laat leeg om
      schakelaar-detectie over te slaan.
  ha_discovery_trigger_app_id:
    name: Trigger Applicatie-ID
    description: >-
      C-Bus app-ID voor triggergroepen (keypads, scènes). Veelgebruikte
      waarde: 202. Laat leeg om trigger-detectie over te slaan.
  ha_discovery_scene_enabled:
    name: Scène-entiteiten inschakelen
    description: >-
      Een Home Assistant scène-entiteit aanmaken voor elke triggergroep,
      naast gebeurtenis- en knop-entiteiten. Standaard: ingeschakeld.
  ha_discovery_auto_type:
    name: Auto-detect Device Types
    description: >-
      Automatically classify Lighting (56) groups whose label looks like a
      motorised cover (blind, shutter, etc.) as Home Assistant cover entities
      instead of lights. Manual type overrides always take precedence.
      Default: enabled.
  ha_discovery_auto_type_name_heuristics:
    name: Auto-detect Using Label Keywords
    description: >-
      When auto-detection is on, match cover keywords in the group label. Turn
      off to disable keyword matching while keeping other auto-detection.
      Default: enabled.
  ha_discovery_auto_type_cover_keywords:
    name: Cover Detection Keywords
    description: >-
      Case-insensitive keywords in a Lighting group label that mark it as a
      cover (matching also catches plurals). Defaults: blind, shutter, shade,
      awning, curtain, roller, garage door.
  ha_discovery_hvac_app_id:
    name: HVAC Applicatie-ID
    description: >-
      C-Bus app-ID voor een verlichtingscompatibele HVAC-groep
      (PAC/touchscreen-blootgesteld). NIET de native Air Conditioning app
      172 — gebruik alleen voor groepen die door een PAC of touchscreen
      worden gespiegeld op een verlichtingsstijl app. Laat leeg om
      HVAC-detectie over te slaan.
  ha_hvac_temperature_unit:
    name: HVAC Temperatuureenheid
    description: >-
      Temperatuureenheid voor HVAC klimaat-entiteiten. C voor Celsius, F
      voor Fahrenheit. Standaard: C.

  cbus_aircon_app_id:
    name: Applicatie-ID voor airconditioning
    description: >-
      C-Bus Air Conditioning applicatie-id (bijv. 172) voor native alleen-lezen kamertemperatuur. Decodeert zone_temperature-broadcasts en publiceert current_temperature naar cbus/read/{network}/172/{zone}/current_temperature. Standaard uitgeschakeld.

  cbus_aircon_control_enabled:
    name: Airconditioning-besturing
    description: >-
      Sta Home Assistant toe om native C-Bus-thermostaten te bedienen (modus en temperatuur). Standaard uitgeschakeld — het schrijft naar de actieve verwarming/koeling. Vereist een ingestelde airconditioning-applicatie-id.

  # ── Bridge Diagnostiek ──
  ha_bridge_diagnostics_enabled:
    name: Bridge Diagnostiek inschakelen
    description: >-
      Bridge-gezondheidsentiteiten (gereedstatus, verbindingen,
      wachtrijdiepte) publiceren naar Home Assistant. Standaard:
      ingeschakeld.
  ha_bridge_diagnostics_interval_sec:
    name: Diagnostiekinterval (seconden)
    description: >-
      Hoe vaak bridge-diagnostiekstatussen worden vernieuwd. Standaard: 60.

  # ── C-Bus Network (CNI) Monitoring ──
  cni_offline_notification:
    name: CNI-offline melding
    description: >-
      Een Home Assistant-melding tonen als de CNI/PCI-verbinding van een C-Bus-netwerk offline gaat, en deze verwijderen bij herverbinding. Vereist de Home Assistant add-on-omgeving. Standaard uitgeschakeld.

  # ── Detectie van verouderde apparaten ──
  stale_device_detection_enabled:
    name: Detectie van verouderde apparaten inschakelen
    description: >-
      C-Bus apparaten detecteren die stoppen met rapporteren en een
      waarschuwingssensor publiceren. Standaard: ingeschakeld.
  stale_device_threshold_hours:
    name: Drempel voor verouderd apparaat (uren)
    description: >-
      Uren zonder statusupdate voordat een apparaat als verouderd wordt
      beschouwd. Standaard: 24.
  stale_device_check_interval_sec:
    name: Controle-interval voor verouderde apparaten (seconden)
    description: >-
      Hoe vaak er wordt gezocht naar verouderde apparaten. Standaard: 3600
      (1 uur).

  # ── Geavanceerd: Verbindingspool ──
  connection_pool_size:
    name: Verbindingspool grootte
    description: >-
      Aantal parallelle TCP-verbindingen naar C-Gate. Verhogen voor
      installaties met hoge doorvoer, verlagen naar 1 voor ouder C-Gate.
      Standaard: 3.
  connection_health_check_interval_sec:
    name: Gezondheidscontrole-interval (seconden)
    description: >-
      Hoe vaak wordt gecontroleerd of C-Gate verbindingen gezond zijn.
      Standaard: 30.
  connection_keep_alive_interval_sec:
    name: Keep-Alive-interval (seconden)
    description: >-
      Hoe vaak C-Gate verbindingen worden gepingd. Voorkomt stille
      TCP-verbroken verbindingen. Standaard: 60.
  cover_ramp_duration_sec:
    name: Cover Rampduur (seconden)
    description: >-
      Verwachte tijd voor een cover om volledig te openen/sluiten. De
      bridge publiceert geschatte posities tijdens dit venster.
      Standaard: 5.

  # ── Geavanceerd: Labelbestand & Web API ──
  cbus_label_file:
    name: Aangepast labelbestand
    description: >-
      Pad naar een JSON-bestand met aangepaste apparaatnamen. Automatisch
      gedetecteerd van gangbare paden indien niet ingesteld. Het bestand
      wordt bewaakt op wijzigingen.
  web_api_key:
    name: Web API-sleutel
    description: >-
      API-sleutel voor schrijfbewerkingen in de label-editor. Stel dit in
      wanneer poort 8080 buiten HA ingress wordt blootgesteld.
  web_allow_unauthenticated_mutations:
    name: Ongeauthenticeerde webschrijfbewerkingen toestaan (onveilig)
    description: >-
      Schrijf-endpoints zonder API-sleutel toestaan. Uitgeschakeld houden
      tenzij u volledig vertrouwt op netwerktoegang tot deze add-on.
  web_allowed_origins:
    name: Toegestane weborigines (CORS)
    description: >-
      CORS-allowlist voor browsertoegang. Voer volledige origines in zoals
      https://ha.example.com. Laat leeg om cross-origin toegang uit te
      schakelen.
  web_mutation_rate_limit_per_minute:
    name: Web schrijflimiet
    description: >-
      Maximum aantal muterende API-verzoeken per minuut per client.
      Standaard: 120.
