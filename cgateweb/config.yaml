name: "C-Gate Web Bridge"
version: "1.17.2"
slug: cgateweb
description: "Bridge between Clipsal C-Bus systems and MQTT/Home Assistant"
url: "https://github.com/dougrathbone/cgateweb"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: application
boot: auto
init: false
host_network: false
ingress: true
ingress_port: 8080
panel_icon: "mdi:label-outline"
panel_title: "C-Bus Labels"

ports:
  "8080/tcp": null

ports_description:
  "8080/tcp": "C-Bus Label Editor web interface (optional; ingress works without host mapping — set web_api_key if you expose this port)"

homeassistant_api: true

# Map host UART/serial devices into the container so the opt-in alpha
# USB-serial PCI passthrough (cgate_serial_device, issue #28) can work.
uart: true

services:
  - mqtt:want

map:
  - "config:rw"
  - "share:ro"

# ─── Options ────────────────────────────────────────────────────────
# Only fields listed here appear in the UI by default.
# All other fields (marked with ? in schema) can be added by the user
# via "Show unused optional configuration options" in the HA UI.
options:
  # ── Required: C-Gate Connection ──
  cgate_mode: "remote"
  cgate_host: ""
  cgate_project: "HOME"

  # ── Common: Home Assistant Discovery ──
  ha_discovery_enabled: true

  # ── Common: Logging ──
  log_level: "info"

  # ── Array fields require defaults for upgrade compatibility ──
  # HA Supervisor validates these exist in saved config; without defaults
  # here, users upgrading from older versions get a validation error.
  getall_networks:
    - 254
  getall_app_periods: []
  ha_discovery_networks:
    - 254
  ha_discovery_auto_type_cover_keywords:
    - blind
    - shutter
    - shade
    - awning
    - curtain
    - roller
    - garage door
  web_allowed_origins: []

# ─── Schema ─────────────────────────────────────────────────────────
# Fields without ? are required. Fields with ? are optional and hidden
# from the UI unless the user adds them or they appear in options above.
schema:
  # ── C-Gate Connection (required) ──
  cgate_mode: "list(remote|managed)"
  cgate_host: "str"
  cgate_project: "str"
  cgate_port: "int(1,65535)?"
  cgate_event_port: "int(1,65535)?"

  # ── C-Gate Managed Mode ──
  cgate_install_source: "list(download|upload)?"
  cgate_download_url: "str?"
  cgate_download_sha256: "str?"
  cgate_force_reinstall: "bool?"
  # ALPHA (issue #28): opt-in USB-serial PCI passthrough. The device schema
  # type makes the Supervisor render a dropdown of detected serial devices.
  # Deliberately absent from options above so upgrades never write it into
  # existing configs.
  cgate_serial_device: "device(subsystem=tty)?"

  # ── MQTT (auto-detected from Mosquitto add-on) ──
  mqtt_host: "str?"
  mqtt_port: "int(1,65535)?"
  mqtt_username: "str?"
  mqtt_password: "password?"
  mqtt_use_tls: "bool?"
  mqtt_ca_file: "str?"
  mqtt_reject_unauthorized: "bool?"

  # ── C-Bus Monitoring ──
  auto_discover_networks: "bool?"
  getall_networks: ["int(1,255)"]
  getall_on_start: "bool?"
  getall_period: "int(60,86400)?"
  getall_app_periods:
    - app_id: "str"
      period_sec: "int(0,86400)"

  # ── MQTT Publishing ──
  retain_reads: "bool?"
  message_interval: "int(100,10000)?"

  # ── Logging ──
  log_level: "list(debug|info|warn|error)"

  # ── Home Assistant Discovery ──
  ha_discovery_enabled: "bool"
  ha_discovery_prefix: "str?"
  ha_discovery_networks: ["int(1,255)"]
  ha_discovery_cover_app_id: "int(1,255)?"
  ha_discovery_cover_tilt_app_id: "int(1,255)?"
  ha_discovery_switch_app_id: "int(1,255)?"
  ha_discovery_trigger_app_id: "int(1,255)?"
  ha_discovery_scene_enabled: "bool?"
  ha_discovery_auto_type: "bool?"
  ha_discovery_auto_type_name_heuristics: "bool?"
  ha_discovery_type_from_label_prefix: "bool?"
  ha_discovery_auto_type_cover_keywords: ["str"]
  ha_discovery_hvac_app_id: "int(1,255)?"
  cbus_aircon_app_id: "int(1,255)?"
  cbus_aircon_control_enabled: "bool?"
  ha_hvac_temperature_unit: "list(C|F)?"

  # ── Bridge Diagnostics ──
  ha_bridge_diagnostics_enabled: "bool?"
  ha_bridge_diagnostics_interval_sec: "int(10,3600)?"

  # ── Stale Device Detection ──
  stale_device_detection_enabled: "bool?"
  stale_device_threshold_hours: "int(1,720)?"
  stale_device_check_interval_sec: "int(60,86400)?"

  # ── C-Bus Network (CNI) Monitoring ──
  cni_offline_notification: "bool?"

  # ── Advanced: Connection Pool ──
  connection_pool_size: "int(1,10)?"
  connection_health_check_interval_sec: "int(5,300)?"
  connection_keep_alive_interval_sec: "int(10,600)?"

  # ── Advanced: Cover Ramp ──
  cover_ramp_duration_sec: "int(1,300)?"

  # ── Advanced: Label File & Web API ──
  cbus_label_file: "str?"
  web_api_key: "password?"
  web_allow_unauthenticated_mutations: "bool?"
  web_allowed_origins: ["str"]
  web_mutation_rate_limit_per_minute: "int(1,5000)?"
